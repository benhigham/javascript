name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    env:
      TURBO_LOG_ORDER: grouped
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          cache: pnpm
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        timeout-minutes: 5

      - name: Restore Turborepo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('**/turbo.json', '**/pnpm-lock.yaml') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Review dependencies
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0

      - name: Lint pushed commit messages
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        env:
          COMMIT_FROM: ${{ github.event.before }}
          COMMIT_TO: ${{ github.sha }}
        run: |
          if [ -z "$COMMIT_FROM" ] || [ -z "$COMMIT_TO" ]; then
            echo "::error::COMMIT_FROM or COMMIT_TO is empty. Cannot lint commits."
            exit 1
          fi
          pnpm exec commitlint --from "$COMMIT_FROM" --to "$COMMIT_TO" --verbose

      - name: Lint PR commit messages
        if: github.event_name == 'pull_request'
        env:
          COMMIT_FROM: ${{ github.event.pull_request.base.sha }}
          COMMIT_TO: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ -z "$COMMIT_FROM" ] || [ -z "$COMMIT_TO" ]; then
            echo "::error::COMMIT_FROM or COMMIT_TO is empty. Cannot lint commits."
            exit 1
          fi
          pnpm exec commitlint --from "$COMMIT_FROM" --to "$COMMIT_TO" --verbose

      - name: Check formatting
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint
