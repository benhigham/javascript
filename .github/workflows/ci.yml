name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    env:
      TURBO_LOG_ORDER: grouped
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          cache: pnpm
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        timeout-minutes: 5

      - name: Restore Turborepo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('**/turbo.json', '**/pnpm-lock.yaml') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Review dependencies
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0

      - name: Lint pushed commit messages
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        env:
          COMMIT_FROM: ${{ github.event.before }}
          COMMIT_TO: ${{ github.sha }}
        run: |
          if [ -z "$COMMIT_FROM" ] || [ -z "$COMMIT_TO" ]; then
            echo "::error::COMMIT_FROM or COMMIT_TO is empty. Cannot lint commits."
            exit 1
          fi
          pnpm exec commitlint --from "$COMMIT_FROM" --to "$COMMIT_TO" --verbose

      - name: Lint PR commit messages
        if: github.event_name == 'pull_request'
        env:
          COMMIT_FROM: ${{ github.event.pull_request.base.sha }}
          COMMIT_TO: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ -z "$COMMIT_FROM" ] || [ -z "$COMMIT_TO" ]; then
            echo "::error::COMMIT_FROM or COMMIT_TO is empty. Cannot lint commits."
            exit 1
          fi
          pnpm exec commitlint --from "$COMMIT_FROM" --to "$COMMIT_TO" --verbose

      - name: Check formatting
        run: pnpm run format:check

      - name: Lint affected packages
        if: github.event_name == 'pull_request'
        run: pnpm run lint:affected

      - name: Lint all packages
        if: github.event_name != 'pull_request'
        run: pnpm run lint

      - name: Test affected packages
        if: github.event_name == 'pull_request'
        run: pnpm run test:affected

      - name: Test all packages
        if: github.event_name != 'pull_request'
        run: pnpm run test

      - name: Lint markdown
        run: pnpm run lint:md

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Lint GitHub Actions
        run: pnpm run lint:actions
